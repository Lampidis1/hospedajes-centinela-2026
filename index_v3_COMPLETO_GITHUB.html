<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Hospedajes Centinela 2026 - v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #00A399; --teal-dk: #006973; --teal-lt: #E4F6F5;
            --gold: #F2A900; --dark: #1C2632; --gray: #5F6973;
            --gray-lt: #D7DEE4; --white: #FFFFFF; --bg: #F4F7F8; --red: #D0311B;
            --font-display: 'Barlow Condensed', sans-serif;
            --font-body: 'Barlow', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--dark); }
        
        /* Header */
        .header {
            background: var(--white); padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100;
        }
        .header h1 {
            font-family: var(--font-display); font-weight: 800;
            font-size: 1.6rem; color: var(--teal-dk);
        }
        .header p { font-size: 0.85rem; color: var(--gray); margin-top: 0.25rem; }
        .header-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        
        /* Buttons */
        .btn {
            background: var(--teal); color: white; border: none;
            padding: 0.65rem 1.25rem; border-radius: 6px; cursor: pointer;
            font-family: var(--font-display); font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s; text-transform: uppercase;
        }
        .btn:hover { background: var(--teal-dk); transform: translateY(-1px); }
        .btn-gold { background: var(--gold); }
        .btn-gold:hover { background: #D89400; }
        .btn-red { background: var(--red); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        
        /* Dashboard */
        .dashboard {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; padding: 1.5rem 2rem; max-width: 1600px; margin: 0 auto;
        }
        .stat-card {
            background: var(--white); padding: 1.5rem; border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid var(--teal);
            transition: all 0.3s; cursor: pointer;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .stat-card.gold { border-left-color: var(--gold); }
        .stat-card.red { border-left-color: var(--red); }
        .stat-label {
            font-family: var(--font-display); font-size: 0.75rem; font-weight: 600;
            color: var(--gray); text-transform: uppercase; margin-bottom: 0.4rem;
        }
        .stat-value {
            font-family: var(--font-display); font-size: 2rem;
            font-weight: 800; color: var(--teal-dk);
        }
        .stat-subtext { font-size: 0.75rem; color: var(--gray); margin-top: 0.4rem; }
        
        /* Grid de Hospedajes */
        .hospedajes-container { padding: 1.5rem 2rem; max-width: 1600px; margin: 0 auto; }
        .hospedajes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        
        /* Tarjeta Hospedaje */
        .hospedaje-card {
            background: var(--white); border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08); transition: all 0.3s;
        }
        .hospedaje-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.15);
        }
        .card-header {
            background: linear-gradient(135deg, var(--teal), var(--teal-dk));
            color: white; padding: 1rem; position: relative; min-height: 90px;
        }
        .card-header h3 {
            font-family: var(--font-display); font-size: 1.1rem;
            font-weight: 700; margin-bottom: 0.3rem;
            padding-right: 10px; /* Espacio para badge */
        }
        .card-header .address { font-size: 0.8rem; opacity: 0.9; }
        
        /* Badge disponibilidad - CORREGIDO: esquina derecha arriba */
        .availability-badge {
            position: absolute; top: 0.6rem; right: 0.6rem;
            background: rgba(255,255,255,0.95); padding: 0.25rem 0.5rem;
            border-radius: 6px; font-size: 0.7rem; font-weight: 700;
            color: var(--teal-dk); text-align: center;
        }
        .availability-badge .value { font-size: 0.95rem; display: block; }
        
        /* Rating - MOVIDO: abajo a la derecha */
        .rating {
            position: absolute; bottom: 0.6rem; right: 0.6rem;
            font-size: 0.9rem;
        }
        
        .card-body { padding: 1rem; }
        .card-info {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 0.8rem; margin-bottom: 0.8rem;
        }
        .info-label {
            font-size: 0.7rem; color: var(--gray);
            text-transform: uppercase; margin-bottom: 0.2rem;
        }
        .info-value { font-weight: 600; color: var(--dark); font-size: 0.95rem; }
        
        .card-actions {
            display: flex; gap: 0.5rem; padding-top: 0.8rem;
            border-top: 1px solid var(--gray-lt);
        }
        
        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            z-index: 1000; overflow-y: auto; padding: 2rem;
        }
        .modal-content {
            background: var(--white); max-width: 900px;
            margin: 0 auto; border-radius: 12px;
        }
        .modal-header {
            background: linear-gradient(135deg, var(--teal), var(--teal-dk));
            color: white; padding: 1.5rem; position: relative;
            border-radius: 12px 12px 0 0;
        }
        .close-modal {
            position: absolute; top: 1rem; right: 1rem;
            background: none; border: none; color: white;
            font-size: 1.8rem; cursor: pointer;
            width: 36px; height: 36px; border-radius: 50%;
        }
        .close-modal:hover { background: rgba(255,255,255,0.2); }
        
        .modal-body { padding: 1.5rem; max-height: calc(100vh - 300px); overflow-y: auto; }
        
        /* Tabs */
        .modal-tabs {
            display: flex; gap: 1rem; border-bottom: 2px solid var(--gray-lt);
            margin-bottom: 1.5rem;
        }
        .tab {
            padding: 0.75rem 1.5rem; background: none; border: none;
            font-family: var(--font-display); font-weight: 600;
            font-size: 0.9rem; color: var(--gray); cursor: pointer;
            position: relative; transition: all 0.2s;
        }
        .tab.active { color: var(--teal-dk); }
        .tab.active::after {
            content: ''; position: absolute; bottom: -2px;
            left: 0; right: 0; height: 2px; background: var(--teal);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Formularios */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-family: var(--font-display); font-size: 0.8rem;
            font-weight: 600; color: var(--gray);
            text-transform: uppercase; margin-bottom: 0.4rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 0.7rem; border: 2px solid var(--gray-lt);
            border-radius: 6px; font-size: 0.9rem; transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--teal);
            box-shadow: 0 0 0 3px var(--teal-lt);
        }
        .checkbox-group {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px; height: 20px; cursor: pointer;
        }
        
        /* Contratos */
        .contratos-list { display: flex; flex-direction: column; gap: 1rem; }
        .contrato-item {
            background: var(--teal-lt); padding: 1rem; border-radius: 8px;
            border-left: 4px solid var(--teal);
        }
        .contrato-item.eecc { border-left-color: var(--gold); background: #FFF9E6; }
        .contrato-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.5rem;
        }
        .contrato-empresa { font-weight: 700; color: var(--teal-dk); }
        
        /* Precios */
        .precios-section {
            background: var(--teal-lt); padding: 1rem;
            border-radius: 8px; margin-bottom: 1rem;
        }
        .precios-section h4 {
            font-family: var(--font-display);
            color: var(--teal-dk); margin-bottom: 0.8rem;
        }
        
        .loading {
            text-align: center; padding: 3rem;
            font-size: 1.1rem; color: var(--gray);
        }
        
        .filters {
            background: var(--white); padding: 1rem 2rem;
            display: flex; gap: 1rem; flex-wrap: wrap;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .filter-group label {
            font-size: 0.75rem; font-weight: 600;
            color: var(--gray); text-transform: uppercase;
        }
        .filter-group input, .filter-group select {
            padding: 0.6rem 0.8rem; border: 2px solid var(--gray-lt);
            border-radius: 6px; font-size: 0.85rem; min-width: 180px;
        }
        
        @media (max-width: 768px) {
            .hospedajes-grid { grid-template-columns: 1fr; }
            .header, .filters, .dashboard { padding: 1rem; }
            .dashboard { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>SISTEMA DE HOSPEDAJES CENTINELA 2026</h1>
            <p>Gestión Integral - Sierra Gorda</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-gold btn-sm" onclick="enviarWhatsAppMasivo()">📱 WhatsApp</button>
            <button class="btn btn-sm" onclick="exportarExcel()">📊 Excel</button>
            <button class="btn btn-sm" onclick="guardarJSON()">💾 Guardar</button>
        </div>
    </div>
    
    <div class="dashboard">
        <div class="stat-card">
            <div class="stat-label">Total Habitaciones</div>
            <div class="stat-value" id="totalHabitaciones">--</div>
            <div class="stat-subtext">Reportadas</div>
        </div>
        <div class="stat-card gold">
            <div class="stat-label">EECC Centinela</div>
            <div class="stat-value" id="habitacionesEECC">--</div>
            <div class="stat-subtext">Utilizadas</div>
        </div>
        <div class="stat-card red">
            <div class="stat-label">Otras Empresas</div>
            <div class="stat-value" id="habitacionesOtras">--</div>
            <div class="stat-subtext">Utilizadas</div>
        </div>
        <div class="stat-card" onclick="filtrarDisponibles()">
            <div class="stat-label">Disponibles</div>
            <div class="stat-value" id="habitacionesDisponibles">--</div>
            <div class="stat-subtext">Click para filtrar</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Hospedajes</div>
            <div class="stat-value" id="totalHospedajes">--</div>
            <div class="stat-subtext">Activos</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Ocupación</div>
            <div class="stat-value" id="tasaOcupacion">--</div>
            <div class="stat-subtext">Promedio</div>
        </div>
    </div>
    
    <div class="filters">
        <div class="filter-group">
            <label>Buscar</label>
            <input type="text" id="searchInput" placeholder="Nombre..." oninput="aplicarFiltros()">
        </div>
        <div class="filter-group">
            <label>Categoría</label>
            <select id="categoriaFilter" onchange="aplicarFiltros()">
                <option value="">Todas</option>
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Disponibilidad</label>
            <select id="disponibilidadFilter" onchange="aplicarFiltros()">
                <option value="">Todas</option>
                <option value="disponible">Con disponibles</option>
                <option value="completo">Completo</option>
            </select>
        </div>
    </div>
    
    <div class="hospedajes-container">
        <div id="hospedajesGrid" class="hospedajes-grid">
            <div class="loading">⏳ Cargando hospedajes...</div>
        </div>
    </div>
    
    <!-- Modal -->
    <div id="modal" class="modal" onclick="if(event.target.id==='modal') cerrarModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <button class="close-modal" onclick="cerrarModal()">&times;</button>
                <h2 id="modalNombre"></h2>
                <p id="modalDireccion"></p>
                <div style="margin-top:0.8rem" id="modalRating"></div>
            </div>
            <div class="modal-body">
                <div class="modal-tabs">
                    <button class="tab active" onclick="cambiarTab('detalles')">Detalles</button>
                    <button class="tab" onclick="cambiarTab('editar')">Editar</button>
                    <button class="tab" onclick="cambiarTab('contratos')">Contratos</button>
                    <button class="tab" onclick="cambiarTab('precios')">Precios</button>
                </div>
                
                <div id="tabDetalles" class="tab-content active"></div>
                <div id="tabEditar" class="tab-content"></div>
                <div id="tabContratos" class="tab-content"></div>
                <div id="tabPrecios" class="tab-content"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        let hospedajesData = [];
        let hospedajesFiltrados = [];
        let hospedajeActual = null;
        
        // URL ABSOLUTA - SIEMPRE FUNCIONA
        const JSON_URL = 'https://raw.githubusercontent.com/Lampidis1/hospedajes-centinela-2026/main/data/hospedajes.json';
        
        async function cargarDatos() {
            console.log('🔍 Cargando desde:', JSON_URL);
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                console.log('✅ JSON cargado:', data.hospedajes?.length || 0, 'hospedajes');
                procesarDatos(data);
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('hospedajesGrid').innerHTML = `
                    <div class="loading" style="color:var(--red)">
                        ❌ Error al cargar: ${error.message}<br>
                        <button class="btn btn-sm" onclick="location.reload()" style="margin-top:1rem">🔄 Reintentar</button>
                    </div>`;
            }
        }
        
        function procesarDatos(data) {
            hospedajesData = data.hospedajes || [];
            hospedajesFiltrados = [...hospedajesData];
            actualizarDashboard();
            renderizarHospedajes();
        }
        
        function actualizarDashboard() {
            const totalHab = hospedajesData.reduce((s, h) => s + (h.habitaciones?.total || 0), 0);
            const habEECC = hospedajesData.reduce((s, h) => {
                const contratos = h.contratos || [];
                return s + contratos.filter(c => c.tipo_cliente === 'EECC_CEN')
                    .reduce((sc, c) => sc + (c.habitaciones_usadas || 0), 0);
            }, 0);
            const habOtras = hospedajesData.reduce((s, h) => {
                const contratos = h.contratos || [];
                return s + contratos.filter(c => c.tipo_cliente !== 'EECC_CEN')
                    .reduce((sc, c) => sc + (c.habitaciones_usadas || 0), 0);
            }, 0);
            const habDisp = totalHab - habEECC - habOtras;
            const tasaOcup = totalHab > 0 ? Math.round(((habEECC + habOtras) / totalHab) * 100) : 0;
            
            document.getElementById('totalHabitaciones').textContent = totalHab;
            document.getElementById('habitacionesEECC').textContent = habEECC;
            document.getElementById('habitacionesOtras').textContent = habOtras;
            document.getElementById('habitacionesDisponibles').textContent = habDisp;
            document.getElementById('totalHospedajes').textContent = hospedajesData.length;
            document.getElementById('tasaOcupacion').textContent = tasaOcup + '%';
        }
        
        function renderizarHospedajes() {
            const grid = document.getElementById('hospedajesGrid');
            if (hospedajesFiltrados.length === 0) {
                grid.innerHTML = '<div class="loading">No se encontraron resultados</div>';
                return;
            }
            
            grid.innerHTML = hospedajesFiltrados.map(h => {
                const totalHab = h.habitaciones?.total || 0;
                const contratos = h.contratos || [];
                const usadas = contratos.reduce((s, c) => s + (c.habitaciones_usadas || 0), 0);
                const disponibles = totalHab - usadas;
                
                return `
                    <div class="hospedaje-card">
                        <div class="card-header">
                            <div class="availability-badge">
                                <span class="value">${disponibles}/${totalHab}</span>
                            </div>
                            <h3>${h.nombre || 'Sin nombre'}</h3>
                            <div class="address">${h.direccion || h.localidad || 'Sierra Gorda'}</div>
                            <div class="rating">${'⭐'.repeat(h.categoria || 0)}</div>
                        </div>
                        <div class="card-body">
                            <div class="card-info">
                                <div><div class="info-label">Camas</div><div class="info-value">${h.camas_instaladas || 0}</div></div>
                                <div><div class="info-label">Encargado</div><div class="info-value" style="font-size:0.8rem">${(h.encargado || 'N/A').substring(0,15)}</div></div>
                                <div><div class="info-label">Teléfono</div><div class="info-value" style="font-size:0.8rem">${(h.telefono || 'N/A').substring(0,12)}</div></div>
                                <div><div class="info-label">RUT</div><div class="info-value" style="font-size:0.75rem">${(h.rut || 'N/A').substring(0,12)}</div></div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-sm" style="flex:1" onclick="editarHospedaje(${h.id})">✏️ Editar</button>
                                <button class="btn btn-gold btn-sm" onclick="enviarWhatsApp(${h.id})">📱</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function aplicarFiltros() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const categoria = document.getElementById('categoriaFilter').value;
            const disponibilidad = document.getElementById('disponibilidadFilter').value;
            
            hospedajesFiltrados = hospedajesData.filter(h => {
                const matchSearch = !search || (h.nombre || '').toLowerCase().includes(search);
                const matchCategoria = !categoria || h.categoria == categoria;
                
                const totalHab = h.habitaciones?.total || 0;
                const usadas = (h.contratos || []).reduce((s, c) => s + (c.habitaciones_usadas || 0), 0);
                const disponibles = totalHab - usadas;
                
                const matchDisponibilidad = !disponibilidad ||
                    (disponibilidad === 'disponible' && disponibles > 0) ||
                    (disponibilidad === 'completo' && disponibles === 0);
                
                return matchSearch && matchCategoria && matchDisponibilidad;
            });
            
            renderizarHospedajes();
        }
        
        function filtrarDisponibles() {
            document.getElementById('disponibilidadFilter').value = 'disponible';
            aplicarFiltros();
        }
        
        function editarHospedaje(id) {
            hospedajeActual = hospedajesData.find(h => h.id === id);
            if (!hospedajeActual) return;
            
            document.getElementById('modalNombre').textContent = hospedajeActual.nombre;
            document.getElementById('modalDireccion').textContent = hospedajeActual.direccion;
            document.getElementById('modalRating').textContent = '⭐'.repeat(hospedajeActual.categoria || 0);
            
            cargarTabDetalles();
            cargarTabEditar();
            cargarTabContratos();
            cargarTabPrecios();
            
            cambiarTab('editar');
            document.getElementById('modal').style.display = 'block';
        }
        
        function cambiarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            const tabs = ['detalles', 'editar', 'contratos', 'precios'];
            const index = tabs.indexOf(tab);
            if (index >= 0) {
                document.querySelectorAll('.tab')[index].classList.add('active');
                document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            }
        }
        
        function cargarTabDetalles() {
            const h = hospedajeActual;
            const hab = h.habitaciones || {};
            document.getElementById('tabDetalles').innerHTML = `
                <h3 style="margin-bottom:1rem">INFORMACIÓN GENERAL</h3>
                <div class="form-grid">
                    <div><strong>RUT:</strong> ${h.rut || 'N/A'}</div>
                    <div><strong>Encargado:</strong> ${h.encargado || 'N/A'}</div>
                    <div><strong>Teléfono:</strong> ${h.telefono || 'N/A'}</div>
                    <div><strong>Email:</strong> ${h.email || 'N/A'}</div>
                </div>
                <h3 style="margin:1.5rem 0 1rem">HABITACIONES</h3>
                <div class="form-grid">
                    <div><strong>Simples Privado:</strong> ${hab.simples_privado || 0}</div>
                    <div><strong>Dobles Privado:</strong> ${hab.dobles_privado || 0}</div>
                    <div><strong>Triples Privado:</strong> ${hab.triples_privado || 0}</div>
                    <div><strong>Total:</strong> ${hab.total || 0}</div>
                </div>
            `;
        }
        
        function cargarTabEditar() {
            const h = hospedajeActual;
            const hab = h.habitaciones || {};
            const est = h.estandares || {};
            
            document.getElementById('tabEditar').innerHTML = `
                <form onsubmit="guardarEdicion(event)">
                    <h3 style="margin-bottom:1rem">HABITACIONES</h3>
                    <div class="form-grid">
                        <div class="form-group"><label>Simples Privado</label><input type="number" id="edit_simples_privado" value="${hab.simples_privado || 0}" min="0"></div>
                        <div class="form-group"><label>Simples Compartido</label><input type="number" id="edit_simples_compartido" value="${hab.simples_compartido || 0}" min="0"></div>
                        <div class="form-group"><label>Dobles Privado</label><input type="number" id="edit_dobles_privado" value="${hab.dobles_privado || 0}" min="0"></div>
                        <div class="form-group"><label>Dobles Compartido</label><input type="number" id="edit_dobles_compartido" value="${hab.dobles_compartido || 0}" min="0"></div>
                        <div class="form-group"><label>Triples Privado</label><input type="number" id="edit_triples_privado" value="${hab.triples_privado || 0}" min="0"></div>
                        <div class="form-group"><label>Triples Compartido</label><input type="number" id="edit_triples_compartido" value="${hab.triples_compartido || 0}" min="0"></div>
                    </div>
                    
                    <h3 style="margin:1.5rem 0 1rem">ESTÁNDARES (afectan categoría)</h3>
                    <div class="form-grid">
                        <div class="checkbox-group"><input type="checkbox" id="edit_wifi" ${est.wifi === 'SI' ? 'checked' : ''}><label>WiFi</label></div>
                        <div class="checkbox-group"><input type="checkbox" id="edit_climatizacion" ${est.climatizacion === 'SI' ? 'checked' : ''}><label>Aire Acondicionado</label></div>
                        <div class="checkbox-group"><input type="checkbox" id="edit_alimentacion" ${est.alimentacion === 'SI' ? 'checked' : ''}><label>Alimentación</label></div>
                        <div class="checkbox-group"><input type="checkbox" id="edit_lavanderia" ${est.lavanderia === 'SI' ? 'checked' : ''}><label>Lavandería</label></div>
                    </div>
                    
                    <div style="margin-top:1.5rem">
                        <button type="submit" class="btn">💾 Guardar Cambios</button>
                        <button type="button" class="btn btn-red" onclick="cerrarModal()" style="margin-left:1rem">Cancelar</button>
                    </div>
                </form>
            `;
        }
        
        function cargarTabContratos() {
            const contratos = hospedajeActual.contratos || [];
            document.getElementById('tabContratos').innerHTML = `
                <div style="margin-bottom:1rem">
                    <button class="btn btn-gold" onclick="agregarContrato()">+ Agregar Contrato</button>
                </div>
                <div class="contratos-list">
                    ${contratos.length === 0 ? '<p>No hay contratos</p>' : contratos.map((c, idx) => `
                        <div class="contrato-item ${c.tipo_cliente === 'EECC_CEN' ? 'eecc' : ''}">
                            <div class="contrato-header">
                                <div class="contrato-empresa">${c.empresa}</div>
                                <button class="btn btn-sm btn-red" onclick="eliminarContrato(${idx})">Eliminar</button>
                            </div>
                            <div class="form-grid">
                                <div><strong>Tipo:</strong> ${c.tipo_cliente === 'EECC_CEN' ? 'EECC CEN' : 'Otra'}</div>
                                <div><strong>Trabajadores:</strong> ${c.num_trabajadores || 'N/A'}</div>
                                <div><strong>Habitaciones:</strong> ${c.habitaciones_usadas || 0}</div>
                                <div><strong>Tipo Hab:</strong> ${c.tipo_habitacion || 'N/A'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function cargarTabPrecios() {
            const precios = hospedajeActual.precios || {};
            document.getElementById('tabPrecios').innerHTML = `
                <form onsubmit="guardarPrecios(event)">
                    <div class="precios-section">
                        <h4>Precios por Tipo (CLP)</h4>
                        <div class="form-grid">
                            <div class="form-group"><label>Simple Privado</label><input type="number" id="precio_simple_privado" value="${precios.simple_privado || 0}" step="1000"></div>
                            <div class="form-group"><label>Simple Compartido</label><input type="number" id="precio_simple_compartido" value="${precios.simple_compartido || 0}" step="1000"></div>
                            <div class="form-group"><label>Doble Privado</label><input type="number" id="precio_doble_privado" value="${precios.doble_privado || 0}" step="1000"></div>
                            <div class="form-group"><label>Doble Compartido</label><input type="number" id="precio_doble_compartido" value="${precios.doble_compartido || 0}" step="1000"></div>
                            <div class="form-group"><label>Triple Privado</label><input type="number" id="precio_triple_privado" value="${precios.triple_privado || 0}" step="1000"></div>
                            <div class="form-group"><label>Triple Compartido</label><input type="number" id="precio_triple_compartido" value="${precios.triple_compartido || 0}" step="1000"></div>
                        </div>
                    </div>
                    <button type="submit" class="btn">💾 Guardar Precios</button>
                </form>
            `;
        }
        
        function guardarEdicion(event) {
            event.preventDefault();
            
            hospedajeActual.habitaciones = {
                simples_privado: parseInt(document.getElementById('edit_simples_privado').value) || 0,
                simples_compartido: parseInt(document.getElementById('edit_simples_compartido').value) || 0,
                dobles_privado: parseInt(document.getElementById('edit_dobles_privado').value) || 0,
                dobles_compartido: parseInt(document.getElementById('edit_dobles_compartido').value) || 0,
                triples_privado: parseInt(document.getElementById('edit_triples_privado').value) || 0,
                triples_compartido: parseInt(document.getElementById('edit_triples_compartido').value) || 0,
            };
            hospedajeActual.habitaciones.total = Object.values(hospedajeActual.habitaciones).reduce((a, b) => a + b, 0);
            
            hospedajeActual.estandares = {
                wifi: document.getElementById('edit_wifi').checked ? 'SI' : 'NO',
                climatizacion: document.getElementById('edit_climatizacion').checked ? 'SI' : 'NO',
                alimentacion: document.getElementById('edit_alimentacion').checked ? 'SI' : 'NO',
                lavanderia: document.getElementById('edit_lavanderia').checked ? 'SI' : 'NO'
            };
            
            // Recalcular categoría
            let puntos = 0;
            if (hospedajeActual.estandares.wifi === 'SI') puntos += 20;
            if (hospedajeActual.estandares.climatizacion === 'SI') puntos += 25;
            if (hospedajeActual.estandares.alimentacion === 'SI') puntos += 20;
            if (hospedajeActual.estandares.lavanderia === 'SI') puntos += 15;
            hospedajeActual.categoria = Math.min(5, Math.max(1, Math.ceil(puntos / 20)));
            
            const index = hospedajesData.findIndex(h => h.id === hospedajeActual.id);
            if (index !== -1) hospedajesData[index] = hospedajeActual;
            
            actualizarDashboard();
            renderizarHospedajes();
            cargarTabDetalles();
            
            alert('✅ Cambios guardados');
        }
        
        function agregarContrato() {
            const empresa = prompt('Nombre empresa:');
            if (!empresa) return;
            const esCEN = confirm('¿Es EECC Centinela?');
            const trabajadores = esCEN ? parseInt(prompt('Número trabajadores:') || 0) : 0;
            const habitaciones = parseInt(prompt('Habitaciones usadas:') || 0);
            const tipo = prompt('Tipo habitación (simple/doble/triple):') || 'doble';
            
            if (!hospedajeActual.contratos) hospedajeActual.contratos = [];
            hospedajeActual.contratos.push({
                empresa, tipo_cliente: esCEN ? 'EECC_CEN' : 'OTRA',
                num_trabajadores: trabajadores, habitaciones_usadas: habitaciones,
                tipo_habitacion: tipo, fecha_inicio: new Date().toISOString().split('T')[0]
            });
            
            cargarTabContratos();
            actualizarDashboard();
        }
        
        function eliminarContrato(idx) {
            if (!confirm('¿Eliminar contrato?')) return;
            hospedajeActual.contratos.splice(idx, 1);
            cargarTabContratos();
            actualizarDashboard();
        }
        
        function guardarPrecios(event) {
            event.preventDefault();
            hospedajeActual.precios = {
                simple_privado: parseInt(document.getElementById('precio_simple_privado').value) || 0,
                simple_compartido: parseInt(document.getElementById('precio_simple_compartido').value) || 0,
                doble_privado: parseInt(document.getElementById('precio_doble_privado').value) || 0,
                doble_compartido: parseInt(document.getElementById('precio_doble_compartido').value) || 0,
                triple_privado: parseInt(document.getElementById('precio_triple_privado').value) || 0,
                triple_compartido: parseInt(document.getElementById('precio_triple_compartido').value) || 0,
            };
            alert('✅ Precios guardados');
        }
        
        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        function enviarWhatsApp(id) {
            const h = hospedajesData.find(x => x.id === id);
            if (!h || !h.telefono) return alert('Sin teléfono');
            const msg = encodeURIComponent(`Hola ${h.encargado},\n\nActualización Hospedajes Centinela 2026\n📋 ${h.nombre}\n\n1️⃣ Habitaciones DISPONIBLES hoy: _____\n2️⃣ ¿Contrato EECC CEN? (Sí/No): _____\n\nGracias!`);
            window.open(`https://wa.me/${h.telefono.replace(/[^0-9]/g, '')}?text=${msg}`, '_blank');
        }
        
        function enviarWhatsAppMasivo() {
            alert('Para envío masivo, descarga Excel con números o integra con N8N');
        }
        
        function exportarExcel() {
            const wb = XLSX.utils.book_new();
            const hospedajesFlat = hospedajesData.map(h => ({
                ID: h.id, Nombre: h.nombre, Direccion: h.direccion,
                Telefono: h.telefono, Total_Hab: h.habitaciones?.total || 0,
                Categoria: h.categoria || 0
            }));
            const ws1 = XLSX.utils.json_to_sheet(hospedajesFlat);
            XLSX.utils.book_append_sheet(wb, ws1, 'Hospedajes');
            XLSX.writeFile(wb, `hospedajes_${new Date().toISOString().split('T')[0]}.xlsx`);
        }
        
        function guardarJSON() {
            const data = { hospedajes: hospedajesData, metadata: { ultima_actualizacion: new Date().toISOString().split('T')[0] } };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'hospedajes_actualizado.json';
            a.click();
            alert('✅ JSON descargado. Súbelo a GitHub en data/hospedajes.json');
        }
        
        cargarDatos();
    </script>
</body>
</html>
